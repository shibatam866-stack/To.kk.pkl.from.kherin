<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Untuk Kakak 💌</title>
    <style>
        :root {
            --bg-pink: #fce4ec;
            --pink-inner: #ffb3c6;
            --white: #ffffff;
            --cream: #fff9ed;
            --heart-red: #ff4d6a;
            --shadow-soft: 0 15px 35px rgba(180, 120, 140, 0.18);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--bg-pink);
            background-image: radial-gradient(circle, #fff 10%, transparent 10%);
            background-size: 22px 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
        }

        .container {
            position: relative;
            /* Amplop miring ke kanan 6 derajat */
            transform: rotate(6deg);
            animation: fallIn 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fallIn {
            0% {
                transform: translateY(-150vh) rotate(1deg);
                opacity: 0;
            }
            70% {
                transform: translateY(10px) rotate(7deg);
                opacity: 1;
            }
            100% {
                transform: translateY(0) rotate(6deg);
                opacity: 1;
            }
        }

        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 230px;
            background-color: transparent;
            border-radius: 0 0 18px 18px;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s ease;
            user-select: none;
        }

        .envelope-wrapper:hover {
            transform: scale(1.03);
        }
        .envelope-wrapper.open:hover {
            transform: scale(1.0);
        }

        .envelope-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ffb3c6 0%, #ff9eb5 100%);
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            z-index: 1;
            border-radius: 3px 3px 0 0;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            clip-path: polygon(0 35%, 50% 62%, 100% 35%, 100% 100%, 0 100%);
            z-index: 10;
            border-radius: 0 0 18px 18px;
            box-shadow: inset 0 -10px 15px rgba(0, 0, 0, 0.04);
        }

        .envelope-front::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 1px;
            z-index: 11;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 145px;
            background: #ffffff;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            z-index: 15;
            transform-origin: top center;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.10));
            border-radius: 0 0 2px 2px;
        }

        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0;
            filter: drop-shadow(0 -3px 4px rgba(0, 0, 0, 0.08));
        }

        /* Hati SVG simetris */
        .heart {
            position: absolute;
            top: 50.5%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            z-index: 20;
            filter: drop-shadow(0 4px 8px rgba(200, 50, 70, 0.35));
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            pointer-events: auto;
        }

        .heart svg {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        .heart svg path {
            fill: var(--heart-red);
            stroke: none;
        }

        .envelope-wrapper.open .heart {
            opacity: 0.8;
            transform: translate(-50%, -50%) scale(0.85);
            filter: drop-shadow(0 3px 6px rgba(200, 50, 70, 0.25));
            animation: heartPulse 1.8s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(0.85);
            }
            50% {
                transform: translate(-50%, -50%) scale(0.95);
            }
        }

        /* Container kertas catatan */
        .notes-container {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .note {
            position: absolute;
            width: 115px;
            height: 148px;
            background: var(--cream);
            padding: 14px 10px;
            border-radius: 7px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #e8dcc8;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }

        .note::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(to bottom,
                    transparent,
                    transparent 18px,
                    #e0d5c0 18px,
                    #e0d5c0 19px);
            opacity: 0.5;
            z-index: 0;
            border-radius: 7px;
            pointer-events: none;
        }

        .note::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 10px;
            width: 35px;
            height: 4px;
            background: #d5c4a8;
            border-radius: 2px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        .note-content {
            position: relative;
            z-index: 2;
            font-size: 8px;
            color: #c4b392;
            line-height: 1.5;
            text-align: left;
            width: 100%;
            margin-top: 16px;
            font-style: italic;
            letter-spacing: 0.3px;
            user-select: none;
            pointer-events: none;
        }

        .envelope-wrapper.open .note {
            opacity: 1;
        }
        .envelope-wrapper.open .note:nth-child(1) {
            transform: translate(-72px, -75px) rotate(-8deg);
        }
        .envelope-wrapper.open .note:nth-child(2) {
            transform: translate(0px, -105px) rotate(0deg);
            z-index: 6;
        }
        .envelope-wrapper.open .note:nth-child(3) {
            transform: translate(72px, -75px) rotate(8deg);
        }

        .note:hover {
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.15);
            transform: scale(1.06) !important;
            transition: all 0.3s ease !important;
            border-color: #d5c4a8;
        }

        /* Overlay baca surat */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 194, 210, 0.94);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .active-paper {
            background: #fffdf7;
            width: 85%;
            max-width: 500px;
            padding: 40px 35px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            border: 10px solid #ffe8f0;
            transform: scale(0.5);
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            background-image: repeating-linear-gradient(to bottom,
                    transparent,
                    transparent 28px,
                    #f0e8d8 28px,
                    #f0e8d8 29px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .overlay.show {
            display: flex;
        }
        .overlay.show .active-paper {
            transform: scale(1);
        }

        .active-paper p {
            color: #5d4a3e;
            line-height: 2;
            font-size: 1.1rem;
            margin: 0;
            position: relative;
            z-index: 2;
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
            letter-spacing: 0.2px;
            width: 100%;
            text-align: left;
        }

        /* Tombol navigasi surat */
        .nav-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
            margin-top: 25px;
            z-index: 5;
        }

        .nav-arrow {
            background: #ffb3c6;
            color: white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            line-height: 1;
        }

        .nav-arrow:hover {
            background: #ff85a1;
            transform: scale(1.1);
        }
        .nav-arrow:active {
            transform: scale(0.95);
        }

        .close-hint {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff85a1;
            font-weight: bold;
            font-size: 0.9rem;
            animation: bounceHint 2s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
        }

        @keyframes bounceHint {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        .active-paper::-webkit-scrollbar {
            width: 6px;
        }
        .active-paper::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        .active-paper::-webkit-scrollbar-thumb {
            background: #ffccd5;
            border-radius: 10px;
        }

        /* Partikel confetti ledakan kertas */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffb3c6;
            bottom: 60px;
            left: 50%;
            border-radius: 2px;
            pointer-events: none;
            z-index: 50;
            animation: confettiFly 1s ease-out forwards;
            opacity: 0.9;
        }

        @keyframes confettiFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0.2) rotate(var(--r));
                opacity: 0;
            }
        }

        /* Responsif */
        @media (max-width: 480px) {
            .envelope-wrapper {
                width: 290px;
                height: 195px;
            }
            .heart {
                width: 42px;
                height: 42px;
                top: 51%;
            }
            .note {
                width: 95px;
                height: 120px;
                padding: 10px 8px;
            }
            .note-content {
                font-size: 7px;
                margin-top: 12px;
            }
            .envelope-wrapper.open .note:nth-child(1) {
                transform: translate(-55px, -60px) rotate(-8deg);
            }
            .envelope-wrapper.open .note:nth-child(2) {
                transform: translate(0px, -85px) rotate(0deg);
            }
            .envelope-wrapper.open .note:nth-child(3) {
                transform: translate(55px, -60px) rotate(8deg);
            }
            .active-paper {
                padding: 25px 20px;
                border-width: 7px;
            }
            .active-paper p {
                font-size: 1rem;
                line-height: 1.8;
            }
            .nav-arrow {
                width: 32px;
                height: 32px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Audio efek suara -->
    <audio id="hadiahAudio" src="hadiah.mp3" preload="auto"></audio>
    <audio id="dandelionsAudio" src="dandelions.mp3" preload="auto" loop></audio>

    <div class="container" id="container">
        <div class="envelope-wrapper" id="envelope" aria-label="Amplop surat, klik untuk membuka">
            <div class="envelope-inner"></div>
            <div class="envelope-flap"></div>
            <div class="envelope-front"></div>

            <!-- Hati segel -->
            <div class="heart" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>

            <!-- Tiga kertas kecil di dalam amplop -->
            <div class="notes-container">
                <div class="note" onclick="event.stopPropagation(); openOverlay();" title="Baca surat">
                    <span class="note-content">💌 surat #1</span>
                </div>
                <div class="note" onclick="event.stopPropagation(); openOverlay();" title="Baca surat">
                    <span class="note-content">💌 surat #2</span>
                </div>
                <div class="note" onclick="event.stopPropagation(); openOverlay();" title="Baca surat">
                    <span class="note-content">💌 surat #3</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay baca surat penuh -->
    <div class="overlay" id="overlay" onclick="closeOverlay()" aria-label="Tutup surat">
        <div class="active-paper" onclick="event.stopPropagation()">
            <p id="fullText"></p>
            <div class="nav-buttons">
                <span class="nav-arrow" id="prevNote" onclick="event.stopPropagation(); prevNote();">&lt;</span>
                <span class="nav-arrow" id="nextNote" onclick="event.stopPropagation(); nextNote();">&gt;</span>
            </div>
            <span class="close-hint" onclick="event.stopPropagation(); closeOverlay();">✨ Ketuk di luar kertas untuk menutup ✨</span>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const overlay = document.getElementById('overlay');
        const fullText = document.getElementById('fullText');
        const heart = document.querySelector('.heart');
        const container = document.getElementById('container');

        // Audio
        const hadiahAudio = document.getElementById('hadiahAudio');
        const dandelionsAudio = document.getElementById('dandelionsAudio');

        // Data surat
        const isiCatatan = {
            1: "halo kakak, hari ini hari terakhir aku selesai praktik kerja lapangan (PKL) aku senang sekaliii loh kak karna disini aku bisa dihargai dan diterima dengan baik oleh kakak, senang sekali loh kak rasanya aku bisa bertemu dan pernah menjadi bagian dari hidup kakak, terimakasih atas ilmu yang diberikan dan perhatian kecil yang selalu membuat aku merasa aman, nyaman, dan hangat berada disini. Aku tidak akan pernah melupakan sesuatu yang pernah membuat aku bahagia kak, semoga kakak yang baca ini bahagia selalu ya kak, semoga orang baik seperti kakak selalu dilimpahkan rezeki dan selalu dikelilingi oleh orang² yang baik, kakak berhak bahagia dan dibahagiakan, terimakasih kakak🫶🏻",
            2: "aku minta maaf ya kak, kalau selama 3 bulan ini aku belum sempurna dan belum menjadi seperti apa yang kaka inginkan, namun aku akan terus tumbuh dan belajar lagi agar menjadi lebih baik kedepan nya, aku bahagia sekali kak aku senang sekali karna setiap kali aku melakukan kesalahan kakak tidak menyalahkan aku, namun memberitahu aku bagaimana cara yang benar, bagaimana cara yang harus aku lakukan, hati ku sangat terharu ka karna kesalahan ku tidak dihakimi melainkan dituntun dan diajari dengan baik, mungkin bagi kakak itu adalah hal yang biasa saja, namun bagiku aku seperti mendapatkan pertolongan dari yang tadinya aku merasa minder dan tidak dapat membantu banyak menjadi rasa peduli dan terus ingin membantu, aku senang sekalii ka karna selama 3 bulan ini aku tumbuh di lingkungan yang baik dan dikelilingi oleh kakak² yang kuatt, hebatt dan menjadi panutan untuk aku, jika suatu saat aku sudah tumbuh menjadi lebih dewasa aku janji akan terus mengingat kakak dan menjadi seseorang yang hebat seperti kakak, terimakasih telah memberi kesan yang indah dan turut menjadi bagian dalam fase dewasaku",
            3: "semangat kerjanya ya kaa, di tengah kesibukan yang kaka lakukan, jangan lupa untuk istirahat yang cukup, makan yang teratur, dan jaga kesehatan, setiap kali kakak lagi sakit atau kecapean, aku pasti kepikiran, rasanya ga tenang jadi ikut sedih dan khawatir, mungkin kedengeran nya sederhana, tapi bagi aku, melihat kaka sehat itu seneng banget, jadi tolong ya ka, jangan terlalu dipaksakan, jaga diri baik-baik, karena ada orang yang diam-diam peduli dan pengen kaka selalu dalam keadaan baik🫶🏻💗"
        };

        let currentNote = 1;

        function updateNoteText() {
            fullText.innerText = isiCatatan[currentNote];
        }

        // Buka overlay mulai dari surat 1
        function openOverlay() {
            currentNote = 1;
            updateNoteText();
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
            dandelionsAudio.currentTime = 0;
            dandelionsAudio.play().catch(e => console.log('Musik tidak bisa diputar:', e));
        }

        // Tutup overlay
        function closeOverlay() {
            overlay.classList.remove('show');
            document.body.style.overflow = '';
            dandelionsAudio.pause();
            dandelionsAudio.currentTime = 0;
        }

        // Navigasi surat
        function prevNote() {
            if (currentNote > 1) {
                currentNote--;
                updateNoteText();
            }
        }
        function nextNote() {
            if (currentNote < 3) {
                currentNote++;
                updateNoteText();
            }
        }

        // Event keyboard Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.classList.contains('show')) {
                closeOverlay();
            }
        });

        // Fungsi membuat partikel ledakan kertas (confetti)
        function createConfetti() {
            const colors = ['#ffb3c6', '#ff85a1', '#fff', '#ffccd5', '#ff4d6a', '#f8bbd0', '#ffffff'];
            const numParticles = 45;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.classList.add('confetti');
                // Warna acak
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                // Posisi awal random di sekitar pusat amplop (bottom sekitar 60px, left 50% ± spread)
                const spreadX = (Math.random() - 0.5) * 160; // sebaran horizontal
                const spreadY = (Math.random() - 0.5) * 40; // sebaran vertikal awal
                particle.style.left = `calc(50% + ${spreadX}px)`;
                particle.style.bottom = `${60 + spreadY}px`;

                // Arah dan jarak terbang random
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 130;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 50; // cenderung ke atas

                particle.style.setProperty('--x', `${dx}px`);
                particle.style.setProperty('--y', `${dy}px`);
                particle.style.setProperty('--r', `${Math.random() * 720 - 360}deg`);

                // Ukuran sedikit variatif
                const size = 6 + Math.random() * 12;
                particle.style.width = size + 'px';
                particle.style.height = size * (0.8 + Math.random() * 0.8) + 'px';

                container.appendChild(particle);

                // Hapus setelah animasi selesai
                particle.addEventListener('animationend', function() {
                    particle.remove();
                });
            }
        }

        // Event klik amplop (buka/tutup)
        envelope.addEventListener('click', function(e) {
            if (e.target.closest('.note')) return; // jika klik note, jangan toggle amplop
            this.classList.toggle('open');

            if (this.classList.contains('open')) {
                // Mainkan suara hadiah dan ledakan confetti
                hadiahAudio.currentTime = 0;
                hadiahAudio.play().catch(err => console.log('Suara hadiah gagal:', err));
                createConfetti();
            }
        });

        // Klik hati juga membuka amplop
        heart.addEventListener('click', function(e) {
            e.stopPropagation();
            envelope.classList.toggle('open');
            if (envelope.classList.contains('open')) {
                hadiahAudio.currentTime = 0;
                hadiahAudio.play().catch(err => console.log('Suara hadiah gagal:', err));
                createConfetti();
            }
        });

        // Inisialisasi tampilan
        updateNoteText();
    </script>
</body>
</html>
